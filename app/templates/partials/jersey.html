{# jersey_svg(c1, c2, c3, type, number, uid)
   uid — unique prefix per call-site to prevent SVG gradient ID collisions #}
{% macro jersey_svg(c1="#dc2626", c2="#991b1b", c3="#fca5a5", type="short", number="10", uid="j") %}
{%- set gid = uid ~ number -%}
<svg class="jersey-svg" viewBox="0 0 240 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g{{ gid }}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="{{ c1 }}"/>
      <stop offset="100%" stop-color="{{ c2 }}"/>
    </linearGradient>
    <linearGradient id="gh{{ gid }}" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="50%"  stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.08)"/>
    </linearGradient>
    <filter id="fs{{ gid }}" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="rgba(0,0,0,0.28)"/>
    </filter>
  </defs>

  {% if type == "short" %}
  {# ── SHORT SLEEVE ── #}
  <path d="M72,52 L18,68 L10,110 L48,116 L54,88 L58,72"
        fill="url(#g{{ gid }})" filter="url(#fs{{ gid }})"/>
  <path d="M72,52 L18,68 L18,78 L56,66 L58,58" fill="{{ c2 }}"/>

  <path d="M168,52 L222,68 L230,110 L192,116 L186,88 L182,72"
        fill="url(#g{{ gid }})" filter="url(#fs{{ gid }})"/>
  <path d="M168,52 L222,68 L222,78 L184,66 L182,58" fill="{{ c2 }}"/>

  <path d="M58,72 L54,88 L46,240 L194,240 L186,88 L182,72
            L160,48 Q148,70 120,62 Q92,70 80,48 Z"
        fill="url(#g{{ gid }})" filter="url(#fs{{ gid }})"/>

  {% else %}
  {# ── LONG SLEEVE ── #}
  <path d="M72,52 L14,72 L8,200 L44,204 L54,100 L58,72"
        fill="url(#g{{ gid }})" filter="url(#fs{{ gid }})"/>
  <path d="M72,52 L14,72 L14,86 L58,72 L58,58" fill="{{ c2 }}"/>
  <path d="M8,200 L44,204 L44,214 L8,210 Z" fill="{{ c2 }}"/>

  <path d="M168,52 L226,72 L232,200 L196,204 L186,100 L182,72"
        fill="url(#g{{ gid }})" filter="url(#fs{{ gid }})"/>
  <path d="M168,52 L226,72 L226,86 L182,72 L182,58" fill="{{ c2 }}"/>
  <path d="M232,200 L196,204 L196,214 L232,210 Z" fill="{{ c2 }}"/>

  <path d="M58,72 L54,100 L46,240 L194,240 L186,100 L182,72
            L160,48 Q148,70 120,62 Q92,70 80,48 Z"
        fill="url(#g{{ gid }})" filter="url(#fs{{ gid }})"/>
  {% endif %}

  {# ── V-NECK COLLAR ── #}
  <path d="M80,48 Q92,70 120,62 Q148,70 160,48 Q142,34 120,38 Q98,34 80,48 Z"
        fill="{{ c2 }}"/>
  <path d="M100,50 Q112,64 120,60 Q128,64 140,50"
        fill="none" stroke="{{ c3 }}" stroke-width="2" opacity="0.45"/>

  {# ── CHEST HIGHLIGHT ── #}
  <path d="M58,72 L54,100 L80,95 L86,72 Q72,68 58,72 Z"
        fill="url(#gh{{ gid }})" opacity="0.65"/>

  {# ── CENTER PANEL ── #}
  <path d="M108,64 L104,240 L136,240 L132,64 Q126,68 120,66 Q114,68 108,64 Z"
        fill="{{ c2 }}" opacity="0.30"/>

  {# ── NUMBER ── #}
  <text x="120" y="178" text-anchor="middle"
        fill="rgba(255,255,255,0.88)"
        font-family="Inter,Arial,sans-serif"
        font-size="50" font-weight="900" letter-spacing="-2">{{ number }}</text>

  {# ── BOTTOM HEM ── #}
  <path d="M46,230 L194,230 L194,240 L46,240 Z" fill="{{ c2 }}" opacity="0.45"/>
</svg>
{% endmacro %}
